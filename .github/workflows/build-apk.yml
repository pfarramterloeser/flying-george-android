name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;30.0.3" "platforms;android-34"

      - name: Install Gradle 7.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.6/bin" >> $GITHUB_PATH

      - name: Verify assets exist
        run: |
          echo "=== Assets in repo ==="
          ls -la android/app/src/main/assets/
          wc -c android/app/src/main/assets/index.html

      - name: Build debug APK
        working-directory: android
        run: |
          export ANDROID_HOME=${ANDROID_SDK_ROOT}
          gradle assembleDebug --no-daemon --stacktrace 2>&1
          echo "=== APK output ==="
          find . -name "*.apk" -exec ls -lh {} \;

      - name: Verify APK contains game
        run: |
          APK=$(find . -name "app-debug.apk" | head -1)
          echo "APK: $APK"
          ls -lh "$APK"
          # Check APK contains our HTML file
          unzip -l "$APK" | grep -i "index.html" || echo "WARNING: index.html not in APK!"
          unzip -l "$APK" | grep "assets/" || echo "WARNING: no assets in APK!"
          # Show APK size
          du -sh "$APK"

      - name: Rename and upload APK
        run: |
          APK=$(find . -name "app-debug.apk" | head -1)
          cp "$APK" /tmp/flying-george.apk
          ls -lh /tmp/flying-george.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flying-george-apk
          path: /tmp/flying-george.apk
          if-no-files-found: error
