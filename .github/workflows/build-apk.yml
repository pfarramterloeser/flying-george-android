name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;30.0.3" "platforms;android-34"

      - name: Install Gradle 7.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.6/bin" >> $GITHUB_PATH

      - name: Build APK (capture all output)
        working-directory: android
        run: |
          export ANDROID_HOME=${ANDROID_SDK_ROOT}
          gradle assembleDebug --no-daemon --stacktrace > /tmp/build.log 2>&1
          echo "EXIT: $?" >> /tmp/build.log
        continue-on-error: true

      - name: Show build output
        run: |
          echo "=== LAST 200 LINES OF BUILD LOG ==="
          tail -200 /tmp/build.log

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log

      - name: Upload APK if exists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flying-george-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore
