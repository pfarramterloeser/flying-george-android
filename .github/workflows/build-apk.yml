name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build debug APK
        working-directory: android
        run: |
          export ANDROID_HOME=${ANDROID_SDK_ROOT}
          gradle assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log; BUILD_EXIT=${PIPESTATUS[0]}
          echo "Exit code: $BUILD_EXIT"
          # Write last 200 lines of log to repo so we can read it
          tail -200 /tmp/build.log > /tmp/build-tail.log
          # Commit log to repo
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"
          cp /tmp/build-tail.log build-output.log
          git add build-output.log
          git commit -m "CI: build log [skip ci]" || true
          git push || true
          exit $BUILD_EXIT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flying-george-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
