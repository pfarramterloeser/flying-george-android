name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Create debug keystore
        run: |
          mkdir -p ~/.android
          keytool -genkey -v -keystore ~/.android/debug.keystore \
            -alias androiddebugkey -keyalg RSA -keysize 2048 \
            -validity 10000 -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null || true

      - name: Build APK
        working-directory: android
        run: |
          export ANDROID_HOME=${ANDROID_SDK_ROOT}
          gradle assembleRelease --no-daemon 2>&1 | tee /tmp/build.log
          echo "=== APK files found ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flying-george-apk
          path: |
            android/app/build/outputs/apk/**/*.apk
          if-no-files-found: warn
