name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;30.0.3" "platforms;android-34"

      - name: Install Gradle 7.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.6/bin" >> $GITHUB_PATH

      - name: Build APK
        working-directory: android
        run: |
          export ANDROID_HOME=${ANDROID_SDK_ROOT}
          gradle assembleDebug --no-daemon

      - name: Find and verify APK
        id: find_apk
        run: |
          echo "Searching for APK files..."
          find /home/runner/work -name "*.apk" -type f 2>/dev/null | while read f; do
            echo "Found: $f ($(du -sh $f | cut -f1))"
          done
          APK_PATH=$(find /home/runner/work -name "app-debug.apk" -type f 2>/dev/null | head -1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found! Checking build output dir..."
            find /home/runner/work -type d -name "apk" 2>/dev/null
            find /home/runner/work -type d -name "outputs" 2>/dev/null
            exit 1
          fi
          echo "APK found: $APK_PATH"
          echo "Size: $(du -sh $APK_PATH)"
          # Verify it contains our game
          unzip -l "$APK_PATH" | grep -c "assets" || true
          unzip -l "$APK_PATH" | grep "index.html" && echo "✓ Game HTML confirmed in APK!" || echo "WARNING: index.html not found in APK"
          cp "$APK_PATH" /tmp/flying-george.apk
          echo "apk_path=/tmp/flying-george.apk" >> $GITHUB_OUTPUT

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flying-george-apk
          path: /tmp/flying-george.apk
          if-no-files-found: error
