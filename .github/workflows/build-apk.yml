name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;30.0.3" "platforms;android-34"

      - name: Install Gradle 7.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-7.6/bin" >> $GITHUB_PATH

      - name: Debug asset and project structure
        run: |
          echo "=== Full android project tree ==="
          find android -type f | sort
          echo ""
          echo "=== Assets content ==="
          ls -la android/app/src/main/assets/ || echo "NO ASSETS DIR"
          echo ""
          echo "=== index.html present? ==="
          test -f android/app/src/main/assets/index.html && echo "YES: $(wc -c < android/app/src/main/assets/index.html) bytes" || echo "NO"

      - name: Build APK
        working-directory: android
        run: |
          export ANDROID_HOME=${ANDROID_SDK_ROOT}
          gradle assembleDebug --no-daemon

      - name: Verify APK contents
        run: |
          APK=$(find /home/runner/work -name "app-debug.apk" 2>/dev/null | head -1)
          echo "APK path: $APK"
          echo "APK size: $(du -sh $APK)"
          echo "=== APK contents (assets) ==="
          unzip -l "$APK" | grep -i asset || echo "NO ASSETS IN APK!"
          echo "=== All APK entries ==="
          unzip -l "$APK"
          cp "$APK" /tmp/flying-george.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flying-george-apk
          path: /tmp/flying-george.apk
          if-no-files-found: error
