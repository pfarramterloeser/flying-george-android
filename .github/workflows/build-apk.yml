name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK components
        run: |
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34"

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Build debug APK
        working-directory: android
        run: |
          export ANDROID_HOME=${ANDROID_SDK_ROOT}
          gradle assembleDebug --no-daemon
          echo "Build complete. Searching for APK..."
          find /home/runner /tmp -name "*.apk" 2>/dev/null || true
          find . -name "*.apk" 2>/dev/null
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "debug dir not found"
          ls -la app/build/outputs/ 2>/dev/null || echo "outputs dir not found"

      - name: Rename APK
        run: |
          APK=$(find /home/runner/work -name "app-debug.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            cp "$APK" /tmp/flying-george.apk
            echo "APK found at: $APK"
            ls -la /tmp/flying-george.apk
          else
            echo "APK not found, checking all .apk files:"
            find /home/runner/work -name "*.apk" 2>/dev/null
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flying-george-apk
          path: /tmp/flying-george.apk
          if-no-files-found: warn
