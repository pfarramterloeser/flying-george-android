name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm install

      - name: Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Register Expo project & Build APK
        run: |
          # Initialize the project on Expo if not yet registered
          npx eas-cli project:info --non-interactive 2>/dev/null || \
            npx eas-cli project:create --non-interactive --name "flying-george" 2>/dev/null || true
          # Run the build
          npx eas-cli build --platform android --profile preview --non-interactive --no-wait
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Get build URL
        run: |
          echo "Build submitted to EAS! Check your builds at: https://expo.dev/accounts/pfarramterloeser/projects/flying-george/builds"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
