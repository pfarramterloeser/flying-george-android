<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Flying George</title>
<style>*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;user-select:none;}body{background:#1a1a2e;overflow:hidden;font-family:sans-serif;}#gameCanvas{display:block;width:100%;height:100vh;}#controls{position:fixed;bottom:0;left:0;width:100%;height:180px;pointer-events:none;}.ctrl-btn{position:absolute;border-radius:50%;background:rgba(255,255,255,0.12);border:2px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;pointer-events:all;font-size:22px;color:rgba(255,255,255,0.7);cursor:pointer;}.ctrl-btn.active{background:rgba(255,255,255,0.28);}#btn-left{width:64px;height:64px;bottom:70px;left:24px;}#btn-right{width:64px;height:64px;bottom:70px;left:104px;}#btn-up{width:72px;height:72px;bottom:90px;right:24px;}#btn-drop{width:54px;height:54px;bottom:20px;right:110px;font-size:16px;}#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,8,20,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:100;}#overlay h1{color:#e8c86a;font-size:28px;}#overlay p{color:rgba(255,255,255,0.65);font-size:14px;text-align:center;max-width:280px;line-height:1.6;}.start-btn{padding:14px 40px;background:#5c3dbf;border:none;border-radius:8px;color:#fff;font-size:16px;cursor:pointer;}#hud{position:fixed;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;pointer-events:none;}.hud-panel{background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);border-radius:8px;padding:6px 12px;}.hud-label{font-size:10px;color:rgba(255,255,255,0.45);text-transform:uppercase;}.hud-val{font-size:16px;color:#e8c86a;font-weight:500;}#energy-wrap{position:fixed;bottom:185px;left:50%;transform:translateX(-50%);width:160px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:4px 6px;pointer-events:none;}#energy-bar{height:8px;background:linear-gradient(90deg,#4fa3e0,#7ec8e3);border-radius:20px;}.energy-lbl{font-size:9px;color:rgba(255,255,255,0.4);text-align:center;text-transform:uppercase;}</style>
</head><body>
<canvas id="gameCanvas"></canvas>
<div id="hud"><div class="hud-panel"><div class="hud-label">Punkte</div><div class="hud-val" id="hud-score">0</div></div><div class="hud-panel"><div class="hud-label">Leben</div><div class="hud-val" id="hud-lives">❤❤❤</div></div><div class="hud-panel"><div class="hud-label">Zwerge</div><div class="hud-val" id="hud-dwarfs">0/10</div></div></div>
<div id="energy-wrap"><div class="energy-lbl">Magie</div><div id="energy-bar" style="width:100%"></div></div>
<div id="controls"><div class="ctrl-btn" id="btn-left">&#9664;</div><div class="ctrl-btn" id="btn-right">&#9654;</div><div class="ctrl-btn" id="btn-up">&#9650;</div><div class="ctrl-btn" id="btn-drop">&#128142;</div></div>
<div id="overlay"><h1>&#10022; FLYING GEORGE &#10022;</h1><p>Sammle Zwerge ein und bringe sie zu den Zielschaechten!</p><p style="font-size:12px;opacity:0.5">&#9650; Fliegen | &#9664;&#9654; Seite | &#128142; Ablegen</p><button class="start-btn" id="startBtn">Spiel starten</button></div>
<script>
const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
const TILE=32,GRAVITY=0.4,FLY=-1.1,SIDE=0.55,DAMP=0.88,SDAMP=0.82;
const input={left:false,right:false,up:false};let dropPressed=false;
function setupBtn(id,key){const el=document.getElementById(id);el.addEventListener('touchstart',e=>{e.preventDefault();input[key]=true;el.classList.add('active');},{passive:false});el.addEventListener('touchend',e=>{e.preventDefault();input[key]=false;el.classList.remove('active');if(key==='drop')dropPressed=true;},{passive:false});el.addEventListener('mousedown',()=>{input[key]=true;el.classList.add('active');});el.addEventListener('mouseup',()=>{input[key]=false;el.classList.remove('active');if(key==='drop')dropPressed=true;});}
setupBtn('btn-left','left');setupBtn('btn-right','right');setupBtn('btn-up','up');setupBtn('btn-drop','drop');
document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft'||e.key==='a')input.left=true;if(e.key==='ArrowRight'||e.key==='d')input.right=true;if(e.key==='ArrowUp'||e.key==='w')input.up=true;if(e.key===' '){e.preventDefault();dropPressed=true;}});
document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft'||e.key==='a')input.left=false;if(e.key==='ArrowRight'||e.key==='d')input.right=false;if(e.key==='ArrowUp'||e.key==='w')input.up=false;});
const LEVELS=[{map:["###############","#.............#","#.............#","#...##....##..#","#.............#","#.M.......M...#","#.............#","#....###......#","#.............#","#.........M...#","#.............#","#.##......##..#","#.............#","#...E...E.....#","#.............#","#.############","#.............#","###############"],dwarfsGoal:5,bat:false},{map:["###############","#.............#","#..##......##.#","#.............#","#.M.........M.#","#.............#","#....######...#","#.............#","#.M.......M...#","#.............#","#.####....####","#.............#","#...E.....E...#","#.............#","#.............#","#####.....#####","#.............#","###############"],dwarfsGoal:8,bat:true},{map:["###############","#.............#","#.M..####..M..#","#.............#","#..###....###.#","#.............#","#.M.........M.#","#.............#","#.####....####","#.............#","#.M..####..M..#","#.............#","#...E..E..E...#","#.............#","#..###....###.#","#.............#","#.............#","###############"],dwarfsGoal:12,bat:true}];
let state;
function initGame(li=0){const lvl=LEVELS[Math.min(li,LEVELS.length-1)],map=lvl.map,blocks=[],mines=[],crystals=[];for(let r=0;r<map.length;r++){for(let c=0;c<map[r].length;c++){const ch=map[r][c],x=c*TILE,y=r*TILE;if(ch==='#')blocks.push({x,y,w:TILE,h:TILE});else if(ch==='M')mines.push({x:x+8,y:y+4,w:16,h:24,timer:0,lit:false});else if(ch==='E')crystals.push({x:x+8,y:y+8,w:16,h:16,alive:true,val:2000+Math.floor(Math.random()*2)*2000});}}state={level:li,score:0,lives:3,dwarfsDelivered:0,dwarfsGoal:lvl.dwarfsGoal,dwarfsKilled:0,maxKill:5,blocks,mines,crystals,player:{x:canvas.width/2,y:canvas.height*0.35,vx:0,vy:0,w:28,h:28,health:10000,maxHealth:10000,dwarfOnBoard:false,stoneOnBoard:false,targetMine:null,passengerSprite:0,reward:0},dwarfs:[],stone:null,bats:[],batTimer:lvl.bat?300:-1,particles:[],spawnTimer:120,phase:'playing',phaseTimer:0,mapH:map.length*TILE,mapW:map[0].length*TILE};spawnStone();}
function spawnStone(){if(state.stone)return;const m=state.mines[Math.floor(Math.random()*state.mines.length)];if(m)state.stone={x:m.x,y:m.y-20,vx:(Math.random()-0.5)*2,vy:-2,w:20,h:20,alive:true,angle:0};}
function spawnDwarf(){const avail=state.mines.filter(m=>!m.lit);if(!avail.length)return;const mine=avail[Math.floor(Math.random()*avail.length)],targets=state.mines.filter(m=>m!==mine);if(!targets.length)return;const target=targets[Math.floor(Math.random()*targets.length)];state.dwarfs.push({x:mine.x+4,y:mine.y-8,vx:Math.random()>0.5?0.6:-0.6,vy:0,w:20,h:28,alive:true,reward:12000,minReward:2400,rewardSpeed:4,targetMine:target,spriteIdx:Math.floor(Math.random()*3),mineOfBirth:mine,walkTimer:0});mine.lit=true;}
function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function resolveBlocks(obj){for(const bl of state.blocks){if(!overlap(obj,bl))continue;const ox=(obj.x+obj.w/2)-(bl.x+bl.w/2),oy=(obj.y+obj.h/2)-(bl.y+bl.h/2),px=bl.w/2+obj.w/2-Math.abs(ox),py=bl.h/2+obj.h/2-Math.abs(oy);if(px<py){obj.x+=ox>0?px:-px;obj.vx*=-0.3;}else{if(oy<0){obj.y-=py;if(obj.vy>0)obj.vy*=-0.1;}else{obj.y+=py;if(obj.vy<0)obj.vy*=-0.1;}}}}
function getScale(){return Math.min(canvas.width/state.mapW,canvas.height/state.mapH,1.5);}
function burst(x,y,color,n=8){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,spd=1+Math.random()*3;state.particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-2,r:2+Math.random()*3,life:40,maxLife:40,color});}}
function playerDie(){if(state.phase!=='playing')return;state.lives--;state.phase='dying';state.phaseTimer=80;burst(state.player.x+14,state.player.y+14,'#ff8040',20);if(state.player.dwarfOnBoard){state.player.dwarfOnBoard=false;if(state.player.targetMine)state.player.targetMine.lit=false;}}
function update(){if(state.phase!=='playing')return;const p=state.player;p.health-=1.2;if(p.health<=0)playerDie();if(input.up)p.vy+=FLY;if(input.left)p.vx-=SIDE;if(input.right)p.vx+=SIDE;p.vy+=GRAVITY;p.vx*=SDAMP;p.vy*=DAMP;p.vx=Math.max(-8,Math.min(8,p.vx));p.vy=Math.max(-10,Math.min(10,p.vy));p.x+=p.vx;p.y+=p.vy;p.x=Math.max(TILE,Math.min(state.mapW-TILE-p.w,p.x));p.y=Math.max(TILE,Math.min(state.mapH-TILE-p.h,p.y));const spd=Math.sqrt(p.vx*p.vx+p.vy*p.vy);resolveBlocks(p);if(spd>7.5)playerDie();if(dropPressed&&p.stoneOnBoard&&!p.dwarfOnBoard){state.stone={x:p.x+p.w/2-10,y:p.y+p.h,vx:p.vx,vy:p.vy+2,w:20,h:20,alive:true,angle:0};p.stoneOnBoard=false;}dropPressed=false;if(state.stone&&state.stone.alive){const st=state.stone;st.vy+=GRAVITY;st.vx*=0.95;st.x+=st.vx;st.y+=st.vy;st.angle+=st.vx*0.05;resolveBlocks(st);if(!p.stoneOnBoard&&!p.dwarfOnBoard&&overlap(p,st)){p.stoneOnBoard=true;state.stone=null;}}for(const c of state.crystals){if(!c.alive)continue;if(overlap(p,c)){p.health=Math.min(p.maxHealth,p.health+c.val);c.alive=false;burst(c.x+8,c.y+8,'#7ec8e3');}}state.spawnTimer--;if(state.spawnTimer<=0&&state.dwarfs.filter(d=>d.alive).length<3){spawnDwarf();state.spawnTimer=180+Math.floor(Math.random()*120);}for(const d of state.dwarfs){if(!d.alive)continue;if(d.reward>d.minReward)d.reward-=d.rewardSpeed;d.walkTimer++;if(d.walkTimer%60===0)d.vx*=-1;d.vy+=GRAVITY;d.x+=d.vx;d.y+=d.vy;resolveBlocks(d);d.vy=Math.min(d.vy,6);if(overlap(p,d)){const spd2=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(spd2>4&&!p.dwarfOnBoard){d.alive=false;d.mineOfBirth.lit=false;state.dwarfsKilled++;burst(d.x+10,d.y,'#ff4040',12);if(state.dwarfsKilled>=state.maxKill)playerDie();}else if(!p.dwarfOnBoard&&!p.stoneOnBoard){d.alive=false;p.dwarfOnBoard=true;p.targetMine=d.targetMine;p.passengerSprite=d.spriteIdx;p.reward=d.reward;d.targetMine.lit=true;burst(d.x+10,d.y,'#e07050',10);}}}if(p.dwarfOnBoard&&p.targetMine){const tm=p.targetMine,near=Math.abs(p.x-tm.x)<40&&Math.abs(p.y-tm.y)<40,spd3=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(near&&spd3<2){state.score+=Math.floor(p.reward/60);p.dwarfOnBoard=false;p.targetMine.lit=false;p.targetMine=null;p.reward=0;state.dwarfsDelivered++;burst(p.x+14,p.y,'#f0e080',14);if(state.dwarfsDelivered>=state.dwarfsGoal){state.phase='win';state.phaseTimer=120;}}}if(p.dwarfOnBoard&&p.reward>2400)p.reward-=4;if(state.batTimer>0)state.batTimer--;else if(state.batTimer===0){const fl=Math.random()>0.5;state.bats.push({x:fl?-50:state.mapW+50,y:TILE*3+Math.random()*(state.mapH-TILE*6),vx:fl?4:-4,w:40,h:20,alive:true});state.batTimer=300+Math.floor(Math.random()*300);}for(const b of state.bats){if(!b.alive)continue;b.x+=b.vx;if(b.x<-100||b.x>state.mapW+100){b.alive=false;continue;}if(overlap(p,b))playerDie();}state.bats=state.bats.filter(b=>b.alive);for(const pt of state.particles){pt.x+=pt.vx;pt.y+=pt.vy;pt.vy+=0.1;pt.vx*=0.95;pt.life--;}state.particles=state.particles.filter(pt=>pt.life>0);if(state.phase==='dying'){state.phaseTimer--;if(state.phaseTimer<=0){if(state.lives>0)initGame(state.level);else showGameOver();}}if(state.phase==='win'){state.phaseTimer--;if(state.phaseTimer<=0){const n=state.level+1;if(n<LEVELS.length)initGame(n);else showWin();}}
document.getElementById('hud-score').textContent=Math.floor(state.score);document.getElementById('hud-lives').textContent='❤'.repeat(Math.max(0,state.lives));document.getElementById('hud-dwarfs').textContent=state.dwarfsDelivered+'/'+state.dwarfsGoal;const bar=document.getElementById('energy-bar');bar.style.width=Math.max(0,(p.health/10000)*100)+'%';bar.style.background=p.health>5000?'linear-gradient(90deg,#4fa3e0,#7ec8e3)':p.health>2000?'linear-gradient(90deg,#e0a040,#f0c060)':'linear-gradient(90deg,#e04040,#f06060)';}
function render(){if(!state)return;const s=getScale(),ox=(canvas.width-state.mapW*s)/2,oy=(canvas.height-state.mapH*s)/2;ctx.fillStyle='#0d0b1e';ctx.fillRect(0,0,canvas.width,canvas.height);ctx.save();ctx.translate(ox,oy);for(const bl of state.blocks){ctx.fillStyle='#3a3060';ctx.fillRect(bl.x*s,bl.y*s,bl.w*s,bl.h*s);ctx.fillStyle='#5548a0';ctx.fillRect(bl.x*s,bl.y*s,bl.w*s,2);ctx.fillRect(bl.x*s,bl.y*s,2,bl.h*s);}for(const m of state.mines){const mx=m.x*s,my=m.y*s,mw=m.w*s,mh=m.h*s;ctx.fillStyle=m.lit?'#3a2a00':'#1a2a1a';ctx.fillRect(mx-mw*0.5,my,mw*2,mh);ctx.fillStyle=m.lit?'#c8a820':'#50a050';ctx.font=Math.max(10,mh*0.6)+'px sans-serif';ctx.textAlign='center';ctx.fillText(m.lit?'X':'M',mx+mw/2,my+mh*0.75);}for(const c of state.crystals){if(!c.alive)continue;const cx2=c.x*s+c.w*s/2,cy2=c.y*s+c.h*s/2,r=c.w*s/2;ctx.fillStyle=['#a0d8ef','#80e0b0','#f0c060','#f080a0'][Math.floor(c.val/2000)-1]||'#a0d8ef';ctx.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI*2/6-Math.PI/2,rr=i%2===0?r:r*0.5;if(i===0)ctx.moveTo(cx2+Math.cos(a)*rr,cy2+Math.sin(a)*rr);else ctx.lineTo(cx2+Math.cos(a)*rr,cy2+Math.sin(a)*rr);}ctx.closePath();ctx.fill();}if(state.stone&&state.stone.alive){const st=state.stone;ctx.fillStyle='#8080b0';ctx.beginPath();ctx.ellipse(st.x*s+st.w*s/2,st.y*s+st.h*s/2,st.w*s/2,st.h*s/2,st.angle,0,Math.PI*2);ctx.fill();}for(const d of state.dwarfs){if(!d.alive)continue;const dx=d.x*s,dy=d.y*s,dw=d.w*s,dh=d.h*s,col=['#e07050','#50c070','#c0a030'][d.spriteIdx];ctx.fillStyle=col;ctx.fillRect(dx+dw*0.15,dy+dh*0.35,dw*0.7,dh*0.65);ctx.fillStyle='#e8c090';ctx.beginPath();ctx.ellipse(dx+dw/2,dy+dh*0.25,dw*0.32,dh*0.28,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(dx,dy-8,dw,4);ctx.fillStyle=d.reward/12000>0.5?'#80e060':'#e08020';ctx.fillRect(dx,dy-8,dw*d.reward/12000,4);}for(const b of state.bats){if(!b.alive)continue;const bx=b.x*s,by=b.y*s,ws=28*s,fl=Math.sin(Date.now()*0.02)*6*s;ctx.fillStyle='#b060c0';ctx.beginPath();ctx.ellipse(bx,by,18*s,10*s,0,0,Math.PI*2);ctx.fill();}const p=state.player;if(state.phase!=='dying'||Math.floor(Date.now()/100)%2===0){const px=p.x*s,py=p.y*s,pw=p.w*s,ph=p.h*s;ctx.fillStyle='#4fa3e0';ctx.beginPath();ctx.ellipse(px+pw/2,py+ph/2,pw/2,ph/2,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#7ec8e3';ctx.beginPath();ctx.ellipse(px+pw/2,py+ph*0.4,pw*0.35,ph*0.35,0,0,Math.PI*2);ctx.fill();if(p.dwarfOnBoard){ctx.fillStyle=['#e07050','#50c070','#c0a030'][p.passengerSprite];ctx.fillRect(px+pw*0.2,py-ph*0.4,pw*0.6,ph*0.4);}if(p.stoneOnBoard){ctx.fillStyle='#8080b0';ctx.beginPath();ctx.ellipse(px+pw/2,py+ph*0.85,pw*0.3,ph*0.22,0,0,Math.PI*2);ctx.fill();}}if(p.dwarfOnBoard&&p.targetMine){const tm=p.targetMine;ctx.strokeStyle='rgba(255,220,80,0.4)';ctx.lineWidth=2;ctx.setLineDash([6,6]);ctx.beginPath();ctx.moveTo((p.x+p.w/2)*s,(p.y+p.h/2)*s);ctx.lineTo((tm.x+tm.w/2)*s,(tm.y+tm.h/2)*s);ctx.stroke();ctx.setLineDash([]);}for(const pt of state.particles){ctx.globalAlpha=pt.life/pt.maxLife;ctx.fillStyle=pt.color;ctx.beginPath();ctx.arc(pt.x*s,pt.y*s,pt.r*s,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}ctx.restore();}
function showGameOver(){const ov=document.getElementById('overlay');ov.innerHTML='<h1 style="color:#e05050">GAME OVER</h1><p>Punkte: '+Math.floor(state.score)+'</p><button class="start-btn" id="startBtn">Neu starten</button>';ov.style.display='flex';document.getElementById('startBtn').onclick=()=>{ov.style.display='none';initGame(0);};}
function showWin(){const ov=document.getElementById('overlay');ov.innerHTML='<h1 style="color:#e8c86a">GEWONNEN!</h1><p>Punkte: '+Math.floor(state.score)+'</p><button class="start-btn" id="startBtn">Nochmal</button>';ov.style.display='flex';document.getElementById('startBtn').onclick=()=>{ov.style.display='none';initGame(0);};}
let last=0;function loop(ts){last=ts;update();render();requestAnimationFrame(loop);}
document.getElementById('startBtn').onclick=()=>{document.getElementById('overlay').style.display='none';initGame(0);requestAnimationFrame(loop);};
</script></body></html>
